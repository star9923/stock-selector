<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A股智能选股系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 { font-size: 32px; margin-bottom: 8px; }
        .header p { opacity: 0.9; font-size: 14px; }
        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }
        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            color: #6c757d;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
        }
        .tab:hover { background: #e9ecef; }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
            background: white;
        }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .search-box {
            padding: 20px 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .search-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 16px;
        }
        .search-results {
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid #dee2e6;
            border-radius: 8px;
            margin-top: 10px;
        }
        .search-item {
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid #f1f3f5;
            transition: background 0.2s;
        }
        .search-item:hover { background: #f8f9fa; }
        .analysis-container {
            padding: 30px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }
        .info-card h3 {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 8px;
        }
        .info-card .value {
            font-size: 24px;
            font-weight: 700;
            color: #212529;
        }
        .info-card .change {
            font-size: 14px;
            margin-top: 4px;
        }
        .change.positive { color: #28a745; }
        .change.negative { color: #dc3545; }
        .signals {
            margin-top: 20px;
        }
        .signal-item {
            padding: 12px 16px;
            margin-bottom: 10px;
            border-radius: 8px;
            border-left: 4px solid;
        }
        .signal-item.bullish {
            background: #d4edda;
            border-color: #28a745;
        }
        .signal-item.bearish {
            background: #f8d7da;
            border-color: #dc3545;
        }
        .signal-item.neutral {
            background: #fff3cd;
            border-color: #ffc107;
        }
        .recommendation {
            padding: 20px;
            background: #e7f3ff;
            border-radius: 8px;
            border-left: 4px solid #007bff;
            margin-top: 20px;
            font-size: 16px;
            line-height: 1.6;
        }
        .controls {
            padding: 30px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .control-row {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .control-group {
            flex: 1;
            min-width: 150px;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #495057;
            font-size: 14px;
        }
        .control-group input {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .control-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            padding: 20px 30px;
            background: #fff3cd;
            border-bottom: 1px solid #ffeaa7;
            display: none;
        }
        .status.show { display: block; }
        .status.success { background: #d4edda; border-color: #c3e6cb; }
        .status.error { background: #f8d7da; border-color: #f5c6cb; }
        .results {
            padding: 30px;
        }
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .results-header h2 { color: #212529; }
        .timestamp {
            color: #6c757d;
            font-size: 14px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }
        thead {
            background: #f8f9fa;
            position: sticky;
            top: 0;
        }
        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid #e9ecef;
        }
        th {
            font-weight: 600;
            color: #495057;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td { font-size: 14px; color: #212529; }
        tr:hover { background: #f8f9fa; }
        .score {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 13px;
        }
        .score-high { background: #d4edda; color: #155724; }
        .score-mid { background: #fff3cd; color: #856404; }
        .score-low { background: #f8d7da; color: #721c24; }
        .pct-up { color: #dc3545; font-weight: 600; }
        .pct-down { color: #28a745; font-weight: 600; }
        .loading {
            text-align: center;
            padding: 60px;
            color: #6c757d;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .empty {
            text-align: center;
            padding: 60px;
            color: #6c757d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📈 A股智能选股系统</h1>
            <p>技术面 + 基本面综合评分</p>
        </div>

        <!-- 标签页 -->
        <div class="tabs">
            <div class="tab active" onclick="switchTab('select')">智能选股</div>
            <div class="tab" onclick="switchTab('analyze')">个股分析</div>
        </div>

        <!-- 选股页面 -->
        <div id="selectTab" class="tab-content active">
        <div class="controls">
            <div class="control-row">
                <div class="control-group">
                    <label>返回数量</label>
                    <input type="number" id="top" value="20" min="1" max="100">
                </div>
                <div class="control-group">
                    <label>最低得分</label>
                    <input type="number" id="minScore" value="50" min="0" max="100" step="5">
                </div>
                <div class="control-group">
                    <label>技术面权重</label>
                    <input type="number" id="techWeight" value="0.6" min="0" max="1" step="0.1">
                </div>
                <div class="control-group">
                    <label>基本面权重</label>
                    <input type="number" id="fundWeight" value="0.4" min="0" max="1" step="0.1">
                </div>
                <button class="btn btn-primary" onclick="runSelection()">开始选股</button>
            </div>
        </div>

        <div class="status" id="status"></div>

        <div class="results">
            <div class="results-header">
                <h2>选股结果</h2>
                <div class="timestamp" id="timestamp"></div>
            </div>
            <div id="tableContainer">
                <div class="empty">点击"开始选股"运行分析</div>
            </div>
        </div>
        </div>

        <!-- 个股分析页面 -->
        <div id="analyzeTab" class="tab-content">
            <div class="search-box">
                <input type="text" id="searchInput" class="search-input" placeholder="输入股票代码或名称搜索..." onkeyup="searchStock()">
                <div id="searchResults" class="search-results" style="display:none;"></div>
            </div>
            <div id="analysisContainer" class="analysis-container">
                <div class="empty">请搜索并选择要分析的股票</div>
            </div>
        </div>
    </div>

    <script>
        // 标签页切换
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            if (tab === 'select') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('selectTab').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('analyzeTab').classList.add('active');
            }
        }

        // 搜索股票
        let searchTimeout;
        async function searchStock() {
            const keyword = document.getElementById('searchInput').value.trim();
            const resultsDiv = document.getElementById('searchResults');

            if (!keyword) {
                resultsDiv.style.display = 'none';
                return;
            }

            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(async () => {
                try {
                    const res = await fetch(`/api/search?q=${encodeURIComponent(keyword)}`);
                    const result = await res.json();

                    if (result.success && result.data.length > 0) {
                        resultsDiv.innerHTML = result.data.map(item =>
                            `<div class="search-item" onclick="analyzeStock('${item.code}')">
                                ${item.code} - ${item.name}
                            </div>`
                        ).join('');
                        resultsDiv.style.display = 'block';
                    } else {
                        resultsDiv.innerHTML = '<div class="search-item">未找到匹配的股票</div>';
                        resultsDiv.style.display = 'block';
                    }
                } catch (err) {
                    console.error('搜索失败:', err);
                }
            }, 300);
        }

        // 分析股票
        async function analyzeStock(code) {
            document.getElementById('searchResults').style.display = 'none';
            const container = document.getElementById('analysisContainer');
            container.innerHTML = '<div class="spinner"></div><div class="empty">正在分析...</div>';

            try {
                const res = await fetch(`/api/analyze/${code}`);
                const result = await res.json();

                if (result.success) {
                    renderAnalysis(result);
                } else {
                    container.innerHTML = `<div class="empty">分析失败: ${result.error}</div>`;
                }
            } catch (err) {
                container.innerHTML = `<div class="empty">请求失败: ${err.message}</div>`;
            }
        }

        // 渲染分析结果
        function renderAnalysis(data) {
            const info = data.basic_info;
            const tech = data.technical;
            const fund = data.fundamental;

            const changeClass = info.pct_change >= 0 ? 'positive' : 'negative';
            const changeSign = info.pct_change >= 0 ? '+' : '';

            let html = `
                <h2>${data.name} (${data.code})</h2>

                <div class="info-grid">
                    <div class="info-card">
                        <h3>最新价</h3>
                        <div class="value">¥${info.price.toFixed(2)}</div>
                        <div class="change ${changeClass}">${changeSign}${info.change.toFixed(2)} (${changeSign}${info.pct_change.toFixed(2)}%)</div>
                    </div>
                    <div class="info-card">
                        <h3>技术面得分</h3>
                        <div class="value">${tech.score.total.toFixed(1)}</div>
                        <div class="change">趋势${tech.score.trend} 动量${tech.score.momentum} 量能${tech.score.volume}</div>
                    </div>
                    <div class="info-card">
                        <h3>基本面得分</h3>
                        <div class="value">${fund.score.total.toFixed(1)}</div>
                        <div class="change">ROE ${fund.roe.toFixed(2)}% | 毛利率 ${fund.gross_margin.toFixed(2)}%</div>
                    </div>
                    <div class="info-card">
                        <h3>成交量</h3>
                        <div class="value">${(info.volume / 10000).toFixed(0)}万</div>
                        <div class="change">换手率 ${info.turnover_rate.toFixed(2)}%</div>
                    </div>
                </div>

                <h3>技术指标</h3>
                <div class="info-grid">
                    <div class="info-card">
                        <h3>均线系统</h3>
                        <div style="font-size:14px; line-height:1.8;">
                            MA5: ${tech.ma5.toFixed(2)}<br>
                            MA10: ${tech.ma10.toFixed(2)}<br>
                            MA20: ${tech.ma20.toFixed(2)}<br>
                            MA60: ${tech.ma60.toFixed(2)}
                        </div>
                    </div>
                    <div class="info-card">
                        <h3>MACD</h3>
                        <div style="font-size:14px; line-height:1.8;">
                            DIF: ${tech.macd_dif.toFixed(4)}<br>
                            DEA: ${tech.macd_dea.toFixed(4)}<br>
                            柱状图: ${tech.macd_bar.toFixed(4)}
                        </div>
                    </div>
                    <div class="info-card">
                        <h3>RSI</h3>
                        <div class="value">${tech.rsi.toFixed(1)}</div>
                    </div>
                    <div class="info-card">
                        <h3>KDJ</h3>
                        <div style="font-size:14px; line-height:1.8;">
                            K: ${tech.kdj_k.toFixed(1)}<br>
                            D: ${tech.kdj_d.toFixed(1)}<br>
                            J: ${tech.kdj_j.toFixed(1)}
                        </div>
                    </div>
                </div>

                <h3>交易信号</h3>
                <div class="signals">
                    ${data.signals.map(s => `
                        <div class="signal-item ${s.type}">
                            <strong>${s.signal}</strong>: ${s.desc}
                        </div>
                    `).join('')}
                </div>

                <div class="recommendation">
                    <strong>投资建议:</strong> ${data.recommendation}
                </div>
            `;

            document.getElementById('analysisContainer').innerHTML = html;
        }

        // 选股相关函数
        function showStatus(message, type = 'info') {
            const status = document.getElementById('status');
            status.textContent = message;
            status.className = `status show ${type}`;
            setTimeout(() => status.classList.remove('show'), 5000);
        }

        function formatScore(score) {
            const cls = score >= 70 ? 'score-high' : score >= 50 ? 'score-mid' : 'score-low';
            return `<span class="score ${cls}">${score}</span>`;
        }

        function formatPctChange(pct) {
            if (!pct) return '-';
            const cls = pct > 0 ? 'pct-up' : 'pct-down';
            const sign = pct > 0 ? '+' : '';
            return `<span class="${cls}">${sign}${pct.toFixed(2)}%</span>`;
        }

        function renderTable(data) {
            if (!data || data.length === 0) {
                document.getElementById('tableContainer').innerHTML = '<div class="empty">未找到符合条件的股票</div>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>排名</th>
                            <th>代码</th>
                            <th>名称</th>
                            <th>价格</th>
                            <th>涨跌幅</th>
                            <th>市盈率</th>
                            <th>市净率</th>
                            <th>技术分</th>
                            <th>基本分</th>
                            <th>综合分</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach((row, idx) => {
                html += `
                    <tr>
                        <td><strong>${idx + 1}</strong></td>
                        <td>${row.code}</td>
                        <td>${row.name}</td>
                        <td>${row.price ? row.price.toFixed(2) : '-'}</td>
                        <td>${formatPctChange(row.pct_change)}</td>
                        <td>${row.pe ? row.pe.toFixed(2) : '-'}</td>
                        <td>${row.pb ? row.pb.toFixed(2) : '-'}</td>
                        <td>${formatScore(row.tech_score)}</td>
                        <td>${formatScore(row.fund_score)}</td>
                        <td>${formatScore(row.total_score)}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            document.getElementById('tableContainer').innerHTML = html;
        }

        async function runSelection() {
            const btn = document.querySelector('.btn-primary');
            btn.disabled = true;
            btn.textContent = '分析中...';

            document.getElementById('tableContainer').innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>正在分析 A 股市场，请稍候...</p>
                </div>
            `;

            const params = {
                top: parseInt(document.getElementById('top').value),
                min_score: parseFloat(document.getElementById('minScore').value),
                tech_weight: parseFloat(document.getElementById('techWeight').value),
                fund_weight: parseFloat(document.getElementById('fundWeight').value),
            };

            try {
                const res = await fetch('/api/select', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params),
                });

                const result = await res.json();

                if (result.success) {
                    showStatus(`✅ 选股完成，共找到 ${result.count} 只股票`, 'success');
                    document.getElementById('timestamp').textContent = `更新时间: ${result.timestamp}`;
                    renderTable(result.data);
                } else {
                    showStatus(`❌ ${result.message}`, 'error');
                    document.getElementById('tableContainer').innerHTML = `<div class="empty">${result.message}</div>`;
                }
            } catch (err) {
                showStatus(`❌ 请求失败: ${err.message}`, 'error');
                document.getElementById('tableContainer').innerHTML = '<div class="empty">请求失败，请重试</div>';
            } finally {
                btn.disabled = false;
                btn.textContent = '开始选股';
            }
        }

        // 页面加载时尝试获取缓存数据
        window.onload = async () => {
            try {
                const res = await fetch('/api/cache');
                const result = await res.json();
                if (result.success) {
                    document.getElementById('timestamp').textContent = `更新时间: ${result.timestamp}`;
                    renderTable(result.data);
                }
            } catch (err) {
                console.log('无缓存数据');
            }
        };
    </script>
</body>
</html>
